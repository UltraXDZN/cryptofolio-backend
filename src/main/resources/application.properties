spring.application.name=cryptofolio-backend

# Server
server.port=8000

# PostgreSQL datasource
spring.datasource.url=jdbc:postgresql://localhost:5432/cryptofolio
spring.datasource.username=jc
spring.datasource.password=
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# Jackson: ISO-8601 dates, omit null fields
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# CoinGecko (override COINGECKO_API_KEY via environment)
coingecko.api-key=${COINGECKO_API_KEY:}
coingecko.base-url=https://api.coingecko.com/api/v3

# Live price auto-refresh (scheduled CoinGecko sync)
# Demo key allows ~10k calls/month: 60s is fine for dev, raise to 300000 for 24/7.
coingecko.refresh.enabled=true
coingecko.refresh.interval-ms=60000
coingecko.refresh.initial-delay-ms=5000
